services:
  museum:
    image: ghcr.io/ente/server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080" # API
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./museum.rendered.yaml:/museum.yaml:ro
      - /mnt/nvme/ente/data:/data:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/ping"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s

  # Resolve "localhost:3200" in the museum container to the minio container.
  socat:
    image: alpine/socat
    restart: unless-stopped
    network_mode: service:museum
    depends_on: [museum]
    command: "TCP-LISTEN:3200,fork,reuseaddr TCP:minio:3200"

  web:
    image: ghcr.io/ente/web
    restart: unless-stopped
    # Uncomment what you need to tweak.
    ports:
      - "127.0.0.1:3000:3000" # Photos web app
      - "127.0.0.1:3001:3001" # Accounts
      - "127.0.0.1:3002:3002" # Public albums
      - "127.0.0.1:3003:3003" # Auth
      - "127.0.0.1:3004:3004" # Cast
      - "127.0.0.1:3005:3005" # Share
      - "127.0.0.1:3006:3006" # Embed
      - "127.0.0.1:3008:3008" # Paste
      - "127.0.0.1:3009:3009" # Locker
      - "127.0.0.1:3010:3010" # Memories
    # Modify these values to your custom subdomains, if using any
    environment:
      ENTE_API_ORIGIN: ${ENTE_API_ORIGIN}

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: pg_isready -q -d ${POSTGRES_DB} -U ${POSTGRES_USER}
      start_period: 40s
      start_interval: 1s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3200" # MinIO API
      # Uncomment to enable MinIO Web UI      
      # - "127.0.0.1:3201:3201"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --address ":3200" --console-address ":3201"
    volumes:
      - minio-data:/data
    post_start:
      - command: |
          sh -c '
          #!/bin/sh

          while ! mc alias set h0 http://minio:3200 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" 2>/dev/null
          do
            echo "Waiting for minio..."
            sleep 0.5
          done

          cd /data

          mc mb -p b2-eu-cen
          mc mb -p wasabi-eu-central-2-v3
          mc mb -p scw-eu-fr-v3
          '

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nvme/ente/postgres
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nvme/ente/minio
