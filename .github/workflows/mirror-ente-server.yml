name: Mirror Ente Server Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *" # 03:00 UTC on the 1st of every month

permissions:
  packages: write

jobs:
  mirror:
    name: Copy and prune
    runs-on: ubuntu-latest

    steps:
      - name: Set image tag
        id: tag
        run: |
          echo "tag=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install skopeo
        run: sudo apt-get update -qq && sudo apt-get install -y -qq skopeo

      - name: Copy image from upstream to your GHCR
        run: |
          skopeo copy --all \
            docker://ghcr.io/ente/server:latest \
            docker://ghcr.io/${{ steps.tag.outputs.owner }}/ente-server-mirror:${{ steps.tag.outputs.tag }}

      - name: Prune old versions (keep newest 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PACKAGE="ente-server-mirror"

          mapfile -t version_ids < <(gh api \
            "/user/packages/container/${PACKAGE}/versions" \
            --paginate \
            --jq 'sort_by(.created_at) | reverse | .[].id')

          total=${#version_ids[@]}
          echo "Total versions found: $total"

          if (( total <= 3 )); then
            echo "3 or fewer versions present — nothing to prune."
            exit 0
          fi

          for (( i=3; i<total; i++ )); do
            vid="${version_ids[$i]}"
            echo "Deleting old version ID: $vid"
            gh api --method DELETE \
              "/user/packages/container/${PACKAGE}/versions/${vid}"
          done

          echo "Pruning complete. Kept 3 most recent versions."
