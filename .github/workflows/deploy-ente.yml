name: Deploy Ente

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in DEPLOY_USER DEPLOY_HOST DEPLOY_PATH DEPLOY_SSH_PRIVATE_KEY; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error title=Missing required deployment secrets::Set these secrets in repository secrets or Environment 'production': ${missing[*]}"
            exit 1
          fi

          if [[ -z "${DEPLOY_PORT:-}" ]]; then
            echo "DEPLOY_PORT not set; defaulting to 22"
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_PORT=$DEPLOY_PORT" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync .env from secret
        shell: bash
        env:
          ENTE_ENV_FILE: ${{ secrets.ENTE_ENV_FILE }}
        run: |
          set -euo pipefail
          if [[ -z "${ENTE_ENV_FILE:-}" ]]; then
            echo "::error title=Missing ENTE_ENV_FILE::Set ENTE_ENV_FILE in repository secrets or Environment 'production'"
            exit 1
          fi
          printf '%s' "$ENTE_ENV_FILE" > .env.deploy
          scp -P "$DEPLOY_PORT" .env.deploy "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
          rm -f .env.deploy

      - name: Pull latest main and deploy on server
        shell: bash
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' bash '$DEPLOY_PATH/scripts/deploy-remote.sh'"
